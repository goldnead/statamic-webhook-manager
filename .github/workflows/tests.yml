name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: PHP ${{ matrix.php }} · Statamic ${{ matrix.statamic }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        # The CP layer uses Inertia + Vue 3 + native @ui components which
        # only exist in Statamic 6+. Statamic 6 ships Laravel 12/13.
        statamic: ['6.*']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, dom, fileinfo, sqlite, pdo_sqlite, gd
          coverage: none
          tools: composer:v2

      - name: Determine Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ matrix.statamic }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-${{ matrix.statamic }}-
            composer-${{ matrix.php }}-

      - name: Pin Statamic version for this matrix cell
        run: composer require "statamic/cms:${{ matrix.statamic }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Show installed Statamic / Laravel versions
        run: |
          composer show statamic/cms | grep -E '^(name|versions)'
          composer show laravel/framework | grep -E '^(name|versions)' || true

      - name: Run PHPUnit test suite
        run: vendor/bin/phpunit --colors=always
